name: CI
run-name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        version-file: .tool-versions
        version-type: strict

    - name: Restore deps and _build cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ hashFiles('.tool-versions', 'mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - name: Install and compile dependencies
      run: |
        mix deps.get
        mix deps.compile

    - name: Compile
      run: mix compile --warnings-as-errors

    - name: Cache check escript
      id: escript-cache
      uses: actions/cache@v4
      with:
        path: scripts/check
        key: ${{ runner.os }}-escript-${{ hashFiles('.tool-versions', 'mix.lock', 'mix.exs', 'lib/**/*.ex') }}

    - name: Build check escript
      if: steps.escript-cache.outputs.cache-hit != 'true'
      run: mix escript.build

    - name: Upload check escript
      uses: actions/upload-artifact@v4
      with:
        name: check-escript
        path: scripts/check

  all_tests:
    timeout-minutes: 10
    name: All tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:

    - uses: actions/checkout@v4
      with:
        ref: coverage_do_not_delete

    - name: Fetch best coverage value
      run: |
        git status
        echo ${GITHUB_REF#refs/heads/}
        cat best_coverage.json
        BEST_COVERAGE=$(cat best_coverage.json | jq '.message' | sed -e 's/\"//g'  -e 's/%//g')
        BEST_COVERAGE=${BEST_COVERAGE:-0}
        echo "BEST_COVERAGE=${BEST_COVERAGE}" | tee -a $GITHUB_ENV
        if [ -f module_coverage.json ]; then
          cp module_coverage.json /tmp/baseline_module_coverage.json
        else
          echo '{}' > /tmp/baseline_module_coverage.json
        fi

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: check github status
      run: |
        git status
        echo ${GITHUB_REF#refs/heads/}
        echo "BEST_COVERAGE=${{ env.BEST_COVERAGE }}"

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        version-file: .tool-versions
        version-type: strict

    - name: Restore deps and _build cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ hashFiles('.tool-versions', 'mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - name: Install and compile dependencies
      run: |
        mix deps.get
        mix deps.compile

    - name: Compile
      run: mix compile

    - name: Download check escript
      uses: actions/download-artifact@v4
      with:
        name: check-escript
        path: scripts

    - name: Make check executable
      run: chmod +x scripts/check

    - name: Run tests
      run: ./scripts/check --only test --partitions 3 --quiet --verbose

    - name: Generate coverage report
      run: ./scripts/check --full-coverage-output > raport

    - name: Prepare comment with coverage percentages
      run: |
        COVERAGE=$(awk '/Total/ && /[0-9.]+%/ {match($0, /[0-9.]+%/); pct=substr($0, RSTART, RLENGTH-1); print pct; exit}' raport)
        echo "COVERAGE=$COVERAGE" | tee -a $GITHUB_ENV
        echo "COLOR=$(./.github/workflows/scripts/color.sh $COVERAGE)" | tee -a $GITHUB_ENV
        echo "BRANCH=${GITHUB_REF#refs/heads/}" | tee -a $GITHUB_ENV
        echo "BEST_COVERAGE=${{ env.BEST_COVERAGE }}"
        echo "${{ env.BEST_COVERAGE }} - ${COVERAGE}"

        diff=$(bc <<< "${{ env.BEST_COVERAGE }} - ${COVERAGE}")
        abs_value=${diff#-}
        if (( $(bc <<< "${COVERAGE} == ${{ env.BEST_COVERAGE }}") )); then
          TITLE=OK
          MSG="no changes - no better, no worse"
        elif (( $(bc <<< "${COVERAGE} > ${{ env.BEST_COVERAGE }}") )); then
          TITLE=SUCCESS
          MSG="better for ${abs_value}%"
          LAST_LINE="Congratulations! Good job!"
        else
         TITLE=ERROR
         MSG="worse for ${abs_value}%"
         LAST_LINE="Please add more tests to cover missing lines"
        fi

        echo "TITLE=$TITLE" | tee -a $GITHUB_ENV
        echo "MSG=$MSG" | tee -a $GITHUB_ENV
        echo "LAST_LINE=$LAST_LINE" | tee -a $GITHUB_ENV

    - name: Build per-module coverage diff
      run: |
        python3 .github/workflows/scripts/parse_coverage.py raport current_module_coverage.json

        git diff --name-only origin/main...HEAD -- 'lib/**/*.ex' > modified_ex_files.txt || true

        # Extract defmodule names from those files
        > modified_modules.txt
        while IFS= read -r file; do
          if [ -f "$file" ]; then
            grep -oP 'defmodule\s+\K[\w.]+' "$file" >> modified_modules.txt || true
          fi
        done < modified_ex_files.txt
        sort -u modified_modules.txt -o modified_modules.txt

        MODULE_DIFF=$(python3 .github/workflows/scripts/module_coverage_diff.py \
          /tmp/baseline_module_coverage.json \
          current_module_coverage.json \
          modified_modules.txt)

        # Store as multiline env var
        EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
        echo "MODULE_DIFF<<${EOF_MARKER}" >> $GITHUB_ENV
        echo "${MODULE_DIFF}" >> $GITHUB_ENV
        echo "${EOF_MARKER}" >> $GITHUB_ENV

    - name: Find Comment
      if: ${{ github.event_name == 'pull_request' }}
      uses: peter-evans/find-comment@v2
      id: fc
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: 'github-actions[bot]'
        body-includes: Test Coverage Summary Statistics

    - name: Create or update comment
      if: ${{ github.event_name == 'pull_request' }}
      uses: peter-evans/create-or-update-comment@v2
      with:
        comment-id: ${{ steps.fc.outputs.comment-id }}
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          ## Test Coverage Summary Statistics - ${{ env.TITLE }}
          __Coverage:__ ${{ env.COVERAGE }}: ${{ env.MSG }}
          ${{ env.LAST_LINE }}

          ### Modules related to this PR - coverage
          ${{ env.MODULE_DIFF }}
        edit-mode: replace

    - uses: actions/checkout@v4
      with:
        ref: coverage_do_not_delete
        token: ${{ secrets.GH_TOKEN }}
        clean: false

    - name: Create the Badge
      uses: emibcn/badge-action@v2.0.2
      with:
        label: 'Test coverage'
        status: '${{ env.COVERAGE }}%'
        color: '${{ env.COLOR }}'
        path: 'current_coverage.svg'

    - name: Save coverage artifacts
      if: ${{ env.BRANCH == 'main' }}
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        if (( $(bc <<< "${COVERAGE} > ${{ env.BEST_COVERAGE }}") )); then
          echo '{"schemaVersion":1,"label":"Test Coverage","message":"${{ env.COVERAGE }}%","color":"${{ env.COLOR }}","namedLogo":"jest"}' > best_coverage.json
          git add best_coverage.json || true
        fi
        cp current_module_coverage.json module_coverage.json
        git add current_coverage.svg module_coverage.json || true
        git commit -m "update coverage ${{ env.COVERAGE }}%" || true
        git push

  static_code_analysis:
    name: Static Code Analysis
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        version-file: .tool-versions
        version-type: strict

    - name: Restore deps and _build cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ hashFiles('.tool-versions', 'mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - name: Install and compile dependencies
      run: |
        mix deps.get
        mix deps.compile

    - name: Download check escript
      uses: actions/download-artifact@v4
      with:
        name: check-escript
        path: scripts

    - name: Make check executable
      run: chmod +x scripts/check

    - name: Static code analysis
      run: ./scripts/check --only format,credo_strict,sobelow

  dialyzer:
    name: Dialyzer
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        version-file: .tool-versions
        version-type: strict

    - name: Restore deps and _build cache
      uses: actions/cache@v4
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ hashFiles('.tool-versions', 'mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - name: Install and compile dependencies
      run: |
        mix deps.get
        mix deps.compile

    - name: Restore PLT cache
      id: plt-cache
      uses: actions/cache@v4
      with:
        path: priv/plts
        key: ${{ runner.os }}-plt-${{ hashFiles('.tool-versions', 'mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-plt-

    - name: Create PLTs
      if: steps.plt-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p priv/plts
        mix dialyzer --plt

    - name: Download check escript
      uses: actions/download-artifact@v4
      with:
        name: check-escript
        path: scripts

    - name: Make check executable
      run: chmod +x scripts/check

    - name: Run Dialyzer
      run: ./scripts/check --only dialyzer
